name: sync-notion

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync Notion content
        env:
          OUTREACH_NOTION_API_KEY: ${{ secrets.OUTREACH_NOTION_API_KEY }}
          OUTREACH_WORKSHOP_DATA_SOURCE_ID: ${{ secrets.OUTREACH_WORKSHOP_DATA_SOURCE_ID }}
        run: yarn sync:notion

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: chore/sync-notion-content
        run: |
          if git diff --quiet -- src/sections/landing/Events/events.ts src/sections/landing/Impact/impact.ts; then
            echo "No content changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$PR_BRANCH"
          git add src/sections/landing/Events/events.ts src/sections/landing/Impact/impact.ts
          git commit -m "chore: sync notion content"
          git push --force-with-lease origin "$PR_BRANCH"
          node scripts/create-sync-pr.mjs
